<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Portfolio PWA</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Manrope, system-ui, sans-serif;
        background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 30%),
          linear-gradient(180deg, #07101d, #0a1324);
        color: #e2edf6;
      }
      main {
        width: min(560px, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(18px);
      }
      a {
        color: #67e8f9;
      }
    </style>
  </head>
  <body>
    <main>
      <p style="letter-spacing: 0.24em; text-transform: uppercase; font-size: 0.75rem; color: rgba(165, 243, 252, 0.8);">Offline</p>
      <h1 style="font-size: clamp(2rem, 5vw, 3rem); margin: 0.75rem 0 0;">This portfolio is temporarily offline.</h1>
      <p style="line-height: 1.8; color: rgba(226, 237, 246, 0.8);">
        The app shell should still work after the first visit. If you have already installed the PWA,
        reopen the app to access cached pages and assets.
      </p>
      <p><a href="./">Return to the app</a></p>
    </main>
  </body>
  </html>
