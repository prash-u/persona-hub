<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Portfolio</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f7f4ee;
        color: #1a2238;
        padding: 2rem;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f131c; color: #ece8df; }
      }
      h1 { font-size: 2rem; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
      p { opacity: 0.7; max-width: 28rem; margin: 0 auto; line-height: 1.6; }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        background: #1a2238;
        color: #f7f4ee;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
      }
      @media (prefers-color-scheme: dark) {
        a { background: #ece8df; color: #0f131c; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>This page hasn't been cached yet. Reconnect to load fresh content, or head back to a page you've already visited.</p>
      <a href="/">Back home</a>
    </main>
  </body>
</html>
